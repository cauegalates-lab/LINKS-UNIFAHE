<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINKS UNIFAHE</title>
    
    <!-- ÍCONE DA ABA (FAVICON) -->
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23ff6d01'>🔗</text></svg>">
    
    <style>
        :root {
            --bg-orange: #ff6d01;
            --unifahe-blue: #003366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background-color: var(--bg-orange);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 20px 30px;
            width: 95%;
            max-width: 550px;
            height: auto;
            max-height: 90vh;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 5px solid var(--unifahe-blue);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow-y: auto;
            position: relative;
        }

        .container::-webkit-scrollbar {
            width: 5px;
        }
        
        .container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        .container::-webkit-scrollbar-thumb {
            background: var(--unifahe-blue);
            border-radius: 10px;
        }

        .logo {
            max-width: 150px;
            margin: 0 auto 5px;
        }

        h1 {
            font-size: 18px;
            margin: 5px 0 12px 0;
            color: var(--unifahe-blue);
            text-transform: uppercase;
            border-bottom: 2px solid var(--bg-orange);
            padding-bottom: 5px;
        }

        label {
            display: block;
            text-align: left;
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 12px;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 15px;
            outline: none;
            cursor: pointer;
            background: white;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #333;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23003366' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }

        select option {
            padding: 12px;
            font-size: 13px;
        }

        select option:first-of-type {
            color: #999;
            font-style: italic;
        }

        /* Configuração de tempo */
        .time-config {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            gap: 10px;
        }

        .time-config label {
            margin-bottom: 0;
            font-size: 12px;
        }

        .time-config select {
            width: auto;
            margin-bottom: 0;
            padding: 8px 12px;
            flex: 1;
        }

        .output-box {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
            text-align: left;
            font-size: 13px;
            line-height: 1.5;
            min-height: 150px;
            max-height: 180px;
            overflow-y: auto; 
            border: 1px solid #e0e0e0;
            white-space: pre-wrap;
            color: #333;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .output-box a {
            color: var(--unifahe-blue);
            text-decoration: underline;
            word-break: break-all;
            cursor: pointer;
        }

        .output-box a:hover {
            color: var(--bg-orange);
        }

        .output-box strong {
            font-weight: bold;
            color: var(--unifahe-blue);
        }

        .output-box::-webkit-scrollbar {
            width: 5px;
        }
        
        .output-box::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        .output-box::-webkit-scrollbar-thumb {
            background: var(--unifahe-blue);
            border-radius: 10px;
        }

        button {
            background: var(--unifahe-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            transition: transform 0.2s, background 0.2s;
            margin-bottom: 8px;
        }

        button:hover {
            background: #004c99;
            transform: scale(0.98);
        }

        .copy-status {
            font-size: 11px;
            height: 16px;
            color: #28a745;
            font-weight: bold;
            margin-bottom: 8px;
            visibility: hidden;
        }

        .footer {
            text-align: center;
            font-size: 10px;
            color: #999;
            padding-top: 8px;
            border-top: 1px solid #e0e0e0;
            margin-top: 5px;
        }

        .footer span {
            color: var(--bg-orange);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="Horizontal colorido 1.png" alt="UNIFAHE" class="logo">
    <h1>LINKS UNIFAHE</h1>
    
    <label>Escolha a oferta:</label>
    <select id="cursoSelect">
        <option value="">Selecione um curso...</option>
        <!-- ⬇️⬇️⬇️ ALTERE OS LINKS AQUI ⬇️⬇️⬇️ -->
        <option value="https://mpago.la/175wrnZ">2° graduação 12 meses - 12x124,00 - 1.488,00$</option>
        <option value="https://mpago.la/2oTU4EY">2° graduação 12 meses (com desconto) - 12x99,00 - 1.188,00$</option>
        <option value="https://mpago.la/1TeQi4K">1 Pós - 12x69,90 - R$ 838,80</option>
        <option value="https://mpago.la/2svztpF">2° graduação 18 meses - 12x139,00 - 1.668,00$</option>
        <option value="https://mpago.la/2KyjvUE">2° graduação em 18 meses (com desconto) - 12x119,00 - R$1428,00</option>
        <option value= "https://mpago.la/2p8LsXY">Combo 2x 2ª Graduações 12 meses - 12x198,00 - R$2376,00</option>
        <option value="https://mpago.la/2qj7RmJ">Combo 2x 2ª Graduações 18 meses - 12x238,00 - R$2856,00</option>
        <option value=" https://mpago.la/1ra8d5W">2 Pós + 1 Brinde - 12x 89.90 - R$ 1078,80</option>
        <option value="https://mpago.la/2ye193G">2 cursos de 2 graduação 12 meses - 12x 218 - R$2616,00</option>
        <!-- ⬆️⬆️⬆️ ALTERE OS LINKS AQUI ⬆️⬆️⬆️ -->
    </select>

    <!-- Configuração de tempo -->
    <div class="time-config">
        <label>Tempo de expiração:</label>
        <select id="tempoExpiracao">
            <option value="1">1 minuto</option>
            <option value="3">3 minutos</option>
            <option value="5">5 minutos</option>
            <option value="10">10 minutos</option>
            <option value="15" selected>15 minutos</option>
            <option value="25">25 minutos</option>
            <option value="30">30 minutos</option>
            <option value="60">60 minutos</option>
        </select>
    </div>

    <div class="output-box" id="mensagemOutput">Selecione uma oferta acima</div>

    <button onclick="copiarTexto()">Copiar Mensagem</button>
    <div id="status" class="copy-status">Copiado com sucesso!</div>
    
    <div class="footer">
        Desenvolvido por <span>Cauê</span> & IA
    </div>
</div>

<script>
    // Função para abrir link em janela pequena
    function abrirLinkPopup(link) {
        if (!link) return;
        
        const width = 500;
        const height = 600;
        const left = (screen.width - width) / 2;
        const top = (screen.height - height) / 2;
        
        const popup = window.open(
            link,
            '_blank',
            `width=${width},height=${height},left=${left},top=${top},toolbar=yes,scrollbars=yes,resizable=yes`
        );
        
        if (popup) {
            popup.focus();
        } else {
            alert('Por favor, permita pop-ups para este site para abrir o link.');
        }
    }

    function gerarMensagem() {
        const select = document.getElementById('cursoSelect');
        const link = select.value;
        const output = document.getElementById('mensagemOutput');
        const tempoSelect = document.getElementById('tempoExpiracao');
        const minutos = tempoSelect.value;
        
        if (!link) {
            output.innerHTML = "Selecione uma oferta acima";
            return;
        }

        const textoHTML = `Aqui está seu link!<br><a href="#" onclick="abrirLinkPopup('${link}'); return false;">${link}</a><br><br>Lembrando que para sua segurança o link expirará em <strong>${minutos} minutos</strong>.<br><br>Me envie o comprovante assim que finalizar o pagamento. Após o envio liberamos automaticamente seu acesso à plataforma.`;
        
        output.innerHTML = textoHTML;
    }

    function copiarTexto() {
        const select = document.getElementById('cursoSelect');
        const link = select.value;
        const tempoSelect = document.getElementById('tempoExpiracao');
        const minutos = tempoSelect.value;
        
        if (!link) return;
        
        const textoPuro = `Aqui está seu link!\n${link}\n\nLembrando que para sua segurança o link expirará em *${minutos} minutos.*\n\nMe envie o comprovante assim que finalizar o pagamento. Após o envio liberamos automaticamente seu acesso à plataforma.`;

        navigator.clipboard.writeText(textoPuro).then(() => {
            const status = document.getElementById('status');
            status.style.visibility = 'visible';
            setTimeout(() => { status.style.visibility = 'hidden'; }, 2500);
        }).catch(() => {
            alert('Erro ao copiar. Tente novamente.');
        });
    }

    // Evento para gerar mensagem quando selecionar o curso
    document.getElementById('cursoSelect').addEventListener('change', gerarMensagem);
    
    // Evento para gerar mensagem quando mudar os minutos
    document.getElementById('tempoExpiracao').addEventListener('change', gerarMensagem);
</script>

</body>
</html>
